<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absensi Karyawan</title>
    
    <!-- Import Google Fonts: Inter & Space Grotesk -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Konfigurasi Font Tailwind -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Space Grotesk', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="min-h-screen bg-slate-50 flex items-center justify-center p-4 font-sans text-slate-700">

    <div class="max-w-md w-full bg-white rounded-2xl shadow-xl overflow-hidden">
        
        <!-- Header -->
        <div class="bg-[#09090b] p-6 text-white text-center">
            <h1 class="text-2xl font-bold mb-1 font-display tracking-tight">Absensi & Laporan</h1>
            <p class="text-zinc-400 text-sm">Input progres harian kamu disini</p>
        </div>

        <!-- Form Body -->
        <div class="p-6">
            <form id="absenForm" class="space-y-4">
                
                <!-- Input Nama -->
                <div>
                    <label class="block text-sm font-medium mb-1 text-slate-600">Nama Karyawan</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <svg class="h-5 w-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                        </div>
                        <input type="text" id="name" name="name" required placeholder="Contoh: Tika"
                            class="w-full pl-10 pr-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-zinc-800 focus:border-zinc-800 outline-none transition-all">
                    </div>
                </div>

                <!-- Input Tanggal -->
                <div>
                    <label class="block text-sm font-medium mb-1 text-slate-600">Tanggal</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <svg class="h-5 w-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                        </div>
                        <input type="date" id="date" name="date" required
                            class="w-full pl-10 pr-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-zinc-800 focus:border-zinc-800 outline-none transition-all">
                    </div>
                </div>

                <!-- Dropdown Status (Custom dengan SVG Icon) -->
                <div>
                    <label class="block text-sm font-medium mb-1 text-slate-600">Status Kehadiran</label>
                    <div class="relative">
                        <!-- Hidden input untuk disubmit oleh form -->
                        <input type="hidden" id="status" name="status" value="Hadir">
                        
                        <!-- Tombol Dropdown -->
                        <button type="button" id="statusDropdownBtn" class="w-full flex items-center justify-between pl-3 pr-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-zinc-800 focus:border-zinc-800 outline-none transition-all bg-white text-left">
                            <span id="selectedStatusContent" class="flex items-center gap-2 text-slate-700">
                                <svg class="w-5 h-5 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                <span>Hadir</span>
                            </span>
                            <svg class="h-4 w-4 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                        </button>

                        <!-- Menu Dropdown -->
                        <div id="statusDropdownMenu" class="hidden absolute z-10 w-full mt-1 bg-white border border-slate-200 rounded-lg shadow-lg overflow-hidden">
                            <!-- Hadir -->
                            <div class="status-option px-3 py-2 cursor-pointer hover:bg-slate-50 flex items-center gap-2 transition-colors" data-value="Hadir">
                                <svg class="w-5 h-5 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                <span>Hadir</span>
                            </div>
                            <!-- Sakit -->
                            <div class="status-option px-3 py-2 cursor-pointer hover:bg-slate-50 flex items-center gap-2 transition-colors border-t border-slate-100" data-value="Sakit">
                                <svg class="w-5 h-5 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v3m0 0v3m0-3h3m-3 0H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                <span>Sakit</span>
                            </div>
                            <!-- Izin -->
                            <div class="status-option px-3 py-2 cursor-pointer hover:bg-slate-50 flex items-center gap-2 transition-colors border-t border-slate-100" data-value="Izin">
                                <svg class="w-5 h-5 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                                <span>Izin</span>
                            </div>
                            <!-- Libur -->
                            <div class="status-option px-3 py-2 cursor-pointer hover:bg-slate-50 flex items-center gap-2 transition-colors border-t border-slate-100" data-value="Libur">
                                <svg class="w-5 h-5 text-purple-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                                <span>Libur</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Section Tugas (Hanya Muncul jika Hadir) -->
                <div id="taskSection" class="space-y-4">
                    <!-- Input Qty -->
                    <div>
                        <label class="block text-sm font-medium mb-1 text-slate-600">Qty (Tugas Selesai)</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <svg class="h-5 w-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 20l4-16m2 16l4-16M6 9h14M4 15h14"></path></svg>
                            </div>
                            <input type="number" id="qty" name="qty" min="0" required placeholder="Contoh: 20"
                                class="w-full pl-10 pr-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-zinc-800 focus:border-zinc-800 outline-none transition-all">
                        </div>
                    </div>

                    <!-- Input Theme -->
                    <div>
                        <label class="block text-sm font-medium mb-1 text-slate-600">Theme / Pekerjaan</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <svg class="h-5 w-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                            </div>
                            <input type="text" id="theme" name="theme" required placeholder="Contoh: World Ocean Day"
                                class="w-full pl-10 pr-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-zinc-800 focus:border-zinc-800 outline-none transition-all">
                        </div>
                    </div>
                </div>

                <!-- Feedback Messages -->
                <div id="successMessage" class="hidden items-center gap-2 text-green-600 bg-green-50 p-3 rounded-lg text-sm">
                    <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    <span>Absen berhasil dikirim!</span>
                </div>

                <div id="errorMessage" class="hidden items-center gap-2 text-red-600 bg-red-50 p-3 rounded-lg text-sm">
                    <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    <span id="errorText">Gagal mengirim data.</span>
                </div>

                <!-- Submit Button -->
                <button type="submit" id="submitBtn" class="w-full flex items-center justify-center gap-2 py-3 px-4 rounded-lg font-medium font-display tracking-wide text-white transition-all bg-[#09090b] hover:bg-zinc-800 active:transform active:scale-95">
                    <span id="btnText" class="flex items-center gap-2">
                        <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                        Kirim Absen
                    </span>
                    <span id="btnLoading" class="hidden flex items-center gap-2">
                        <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                        Mengirim...
                    </span>
                </button>
                
            </form>
        </div>
    </div>

    <script>
        // Set tanggal hari ini sebagai default
        document.getElementById('date').valueAsDate = new Date();

        // Ambil elemen DOM
        const form = document.getElementById('absenForm');
        
        // Element untuk Custom Dropdown Status
        const statusInput = document.getElementById('status');
        const statusBtn = document.getElementById('statusDropdownBtn');
        const statusMenu = document.getElementById('statusDropdownMenu');
        const selectedStatusContent = document.getElementById('selectedStatusContent');
        const statusOptions = document.querySelectorAll('.status-option');

        const taskSection = document.getElementById('taskSection');
        const qtyInput = document.getElementById('qty');
        const themeInput = document.getElementById('theme');
        
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const btnLoading = document.getElementById('btnLoading');
        const successMessage = document.getElementById('successMessage');
        const errorMessage = document.getElementById('errorMessage');

        // Toggle dropdown menu saat tombol diklik
        statusBtn.addEventListener('click', () => {
            statusMenu.classList.toggle('hidden');
        });

        // Menutup dropdown jika klik di luar elemen dropdown
        document.addEventListener('click', (e) => {
            if (!statusBtn.contains(e.target) && !statusMenu.contains(e.target)) {
                statusMenu.classList.add('hidden');
            }
        });

        // Logika memilih status & menyembunyikan input tugas
        statusOptions.forEach(option => {
            option.addEventListener('click', () => {
                const value = option.dataset.value;
                
                // Update tampilan tombol (Ganti isi button dengan isi option yang dipilih)
                selectedStatusContent.innerHTML = option.innerHTML;
                
                // Set value ke hidden input agar terbaca saat form disubmit
                statusInput.value = value;
                
                // Sembunyikan menu dropdown
                statusMenu.classList.add('hidden');

                // Tampilkan atau sembunyikan tugas
                if (value === 'Hadir') {
                    taskSection.classList.remove('hidden');
                    taskSection.classList.add('block');
                    qtyInput.required = true;
                    themeInput.required = true;
                } else {
                    taskSection.classList.remove('block');
                    taskSection.classList.add('hidden');
                    qtyInput.required = false;
                    themeInput.required = false;
                    qtyInput.value = '';
                    themeInput.value = '';
                }
            });
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Sembunyikan pesan, tampilkan loading
            successMessage.classList.add('hidden');
            successMessage.classList.remove('flex');
            errorMessage.classList.add('hidden');
            errorMessage.classList.remove('flex');
            
            submitBtn.disabled = true;
            submitBtn.classList.replace('bg-[#09090b]', 'bg-zinc-800');
            submitBtn.classList.add('cursor-not-allowed');
            btnText.classList.add('hidden');
            btnLoading.classList.remove('hidden');
            btnLoading.classList.add('flex');

            // URL dari user sudah diimplementasikan di sini
            const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz4o1QdIobK9rIRQqCzQVsJafLdo1izc5fRbUwK0DpjJs5JvcWDx-fkbQtI964dZIsK/exec';

            const formData = {
                name: document.getElementById('name').value,
                date: document.getElementById('date').value,
                status: document.getElementById('status').value, // Menambahkan status dari hidden input
                qty: qtyInput.value,
                theme: themeInput.value
            };

            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(formData)
                });

                // Tampilkan sukses
                successMessage.classList.remove('hidden');
                successMessage.classList.add('flex');
                
                // Kosongkan form Qty dan Theme saja
                qtyInput.value = '';
                themeInput.value = '';
                
                // Kembalikan status ke Hadir
                statusInput.value = 'Hadir';
                selectedStatusContent.innerHTML = document.querySelector('.status-option[data-value="Hadir"]').innerHTML;
                
                // Pastikan task section muncul
                taskSection.classList.remove('hidden');
                taskSection.classList.add('block');
                qtyInput.required = true;
                themeInput.required = true;

                setTimeout(() => {
                    successMessage.classList.add('hidden');
                    successMessage.classList.remove('flex');
                }, 4000);

            } catch (error) {
                // Tampilkan error
                errorMessage.classList.remove('hidden');
                errorMessage.classList.add('flex');
            } finally {
                // Kembalikan tombol ke kondisi semula
                submitBtn.disabled = false;
                submitBtn.classList.replace('bg-zinc-800', 'bg-[#09090b]');
                submitBtn.classList.remove('cursor-not-allowed');
                btnText.classList.remove('hidden');
                btnLoading.classList.add('hidden');
                btnLoading.classList.remove('flex');
            }
        });
    </script>
</body>
</html>
